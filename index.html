<!DOCTYPE html>
<html>
<head>
  <title>Todo App</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
  <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
</head>
<body class="page">
  <div class="header">
    <img src="./eisenhower-matrix.jpg">
    <a class="header__more" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
  </div>
  <div class="main">
    <p id="add">
      <label for="new-task">Add Item</label>
      <div class="add-task">
        <input id="new-task" class="task-text" type="text">
        <button>Add</button>
      </div>
    </p>
    <h3>Todo</h3>
    <ul class="list" id="incompleted-tasks">
      <li class="list__task">
        <input class="list__checkbox" type="checkbox">
        <label class="task-text">Pay Bills</label>
        <input type="text" class="task-text">
        <button class="edit">Edit</button>
        <button class="btn-delete">
          <img src="./remove.svg">
        </button>
      </li>
      <li class="list__task edit-mode">
        <input class="list__checkbox" type="checkbox">
        <label class="task-text">Go Shopping</label>
        <input type="text" value="Go Shopping" class="task-text">
        <button class="edit">Save</button>
        <button class="btn-delete">
          <img src="./remove.svg">
        </button>
      </li>
    </ul>
    <h3>Completed</h3>
    <ul class="list" id="completed-tasks">
      <li class="list__task">
        <input class="list__checkbox" type="checkbox" checked>
        <label class="task-text">See the Doctor</label>
        <input type="text" class="task-text">
        <button class="edit">Edit</button>
        <button class="btn-delete">
          <img src="./remove.svg">
        </button>
      </li>
    </ul>
  </div>
  <script src="app.js"></script>
</body>
</html>
